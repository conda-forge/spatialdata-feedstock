{% set name = "spatialdata" %}
{% set version = "0.8.0" %}
{% set python_min = "3.12" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/spatialdata-{{ version }}.tar.gz
  sha256: 14143788a1de83302f8e83a29dd723b2d4e82f5b130d840409822fbf3a778e25

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - hatch-vcs
    - hatchling
    - pip
    - python {{ python_min }}
  run:
    - anndata >=0.9.1
    - annsel >=0.1.2
    - click
    - dask >=2026.3.0
    - dask-image
    - distributed >=2026.3.0
    - datashader
    - fsspec
    - geopandas >=0.14
    - multiscale-spatial-image ==2.0.3
    - networkx
    - numba >=0.55.0
    - numpy
    - ome-zarr >=0.16.0
    - pandas
    - pooch
    - pyarrow
    - python >={{ python_min }}
    - pytorch
    - rich
    - setuptools
    - shapely >=2.0.1
    - spatial-image >=1.2.3
    - scikit-image
    - scipy !=1.17.0
    - typing_extensions >=4.8.0
    - universal-pathlib >=0.2.6
    - xarray >=2024.10.0
    - xarray-spatial >=0.3.5
    - zarr >=3.0.0

test:
  imports:
    - spatialdata
  commands:
    - pip list
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://pypi.org/project/spatialdata
  summary: Spatial data format.
  license: BSD-3-Clause
  license_file: LICENSE
  dev_url: https://github.com/scverse/spatialdata

extra:
  recipe-maintainers:
    - melonora
    - jdblischak
    - LucaMarconato
    - giovp
    - goanpeca
    - kevinyamauchi
